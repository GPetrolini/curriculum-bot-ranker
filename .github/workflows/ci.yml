name: CI Pipeline - CV Ranker

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        pip install -r requirements.txt --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.8.1/constraints-3.11.txt"

    - name: Validar qualidade do código (Linting com Flake8)
      run: |
        # Isso vai ler automaticamente o seu arquivo .flake8 e avaliar o código
        flake8 .

    - name: Rodar testes automatizados com Pytest
      run: |
        PYTHONPATH=. pytest tests/ -v